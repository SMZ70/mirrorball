<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#07080c">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>mmdj</title>
<style>
  :root {
    --bg:#07080c; --panel:#12141c; --panel2:#1a1e29; --line:#262c3a;
    --text:#e9ecf5; --muted:#7c8497; --accent:#00e5a0; --hot:#ff3d71; --warn:#ffb020;
    --r:14px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { overscroll-behavior:none; }
  body {
    margin:0; padding:14px 14px 40px; background:var(--bg); color:var(--text);
    font:14px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    max-width:760px; margin-inline:auto;
  }

  /* ── Transport: the one bar that is always visible ─────────────────── */
  .transport {
    position:sticky; top:0; z-index:20; margin:-14px -14px 14px; padding:12px 14px;
    background:rgba(7,8,12,.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .bpm { font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
  .bpm small { font-size:11px; color:var(--muted); font-weight:500; margin-left:3px; }
  .beat {
    width:12px; height:12px; border-radius:50%; background:var(--line); flex:none;
    transition:background .05s, box-shadow .05s;
  }
  .beat.on { background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .spacer { flex:1; }

  button {
    font:inherit; font-weight:600; color:var(--text); background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; padding:9px 13px; cursor:pointer;
    transition:transform .05s, background .12s;
  }
  button:active { transform:scale(.95); }
  button.go   { background:var(--accent); color:#00291c; border-color:transparent; }
  button.stop { background:var(--hot);    color:#fff;    border-color:transparent; }
  button.on   { background:var(--warn);   color:#2b1d00; border-color:transparent; }
  button.ghost { background:transparent; color:var(--muted); }

  h2 {
    font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted);
    margin:22px 0 8px; font-weight:600;
  }

  /* ── Tracks ─────────────────────────────────────────────────────────── */
  .track {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    margin-bottom:9px; overflow:hidden;
  }
  .track.muted { opacity:.42; }
  .thead { display:flex; align-items:center; gap:9px; padding:11px 12px; cursor:pointer; }
  .swatch { width:26px; height:26px; border-radius:8px; flex:none; border:1px solid rgba(255,255,255,.14); }
  .tname { font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tinfo { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .chip {
    font-size:10px; font-weight:700; padding:3px 6px; border-radius:6px;
    background:var(--panel2); color:var(--muted); border:1px solid var(--line);
  }
  .chip.s { background:var(--accent); color:#00291c; border-color:transparent; }
  .chip.m { background:var(--hot); color:#fff; border-color:transparent; }

  .body { padding:0 12px 12px; display:none; }
  .track.open .body { display:block; }

  .row { display:flex; align-items:center; gap:8px; margin:9px 0; }
  .row label { font-size:11px; color:var(--muted); width:58px; flex:none; }
  .row .val { font-size:11px; color:var(--muted); width:44px; text-align:right;
              font-variant-numeric:tabular-nums; flex:none; }

  .segs { display:flex; gap:4px; flex-wrap:wrap; flex:1; }
  .seg {
    flex:1; min-width:44px; padding:7px 4px; font-size:11px; font-weight:600;
    background:var(--panel2); border:1px solid var(--line); border-radius:8px;
    text-align:center; cursor:pointer; user-select:none;
  }
  .seg.sel { background:var(--accent); color:#00291c; border-color:transparent; }

  input[type=range] {
    flex:1; -webkit-appearance:none; height:26px; background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height:5px; border-radius:3px; background:var(--line);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; margin-top:-8px;
    border-radius:50%; background:var(--text); border:2px solid var(--bg);
  }
  input[type=range].hue::-webkit-slider-runnable-track {
    background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
  }
  input[type=text] {
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:9px; padding:9px 11px; font:inherit; flex:1; min-width:0;
  }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:7px; }
  #err {
    display:none; margin-bottom:10px; padding:9px 12px; border-radius:10px;
    background:#2a1016; border:1px solid var(--hot); color:#ffb3c4; font-size:12px;
  }
  #err.show { display:block; }
  .hint { font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<div class="transport">
  <span class="beat" id="beat"></span>
  <span class="bpm"><span id="bpm">120</span><small>BPM</small></span>
  <button onclick="send({type:'tap'})">TAP</button>
  <button class="ghost" onclick="send({type:'resync'})">↻</button>
  <span class="spacer"></span>
  <button id="blackout" onclick="toggleBlackout()">BLACK</button>
  <button id="play" class="go" onclick="togglePlay()">▶</button>
</div>

<div id="err"></div>

<h2>Presets</h2>
<div class="grid" id="presets"></div>

<h2>Tracks <span id="area" style="text-transform:none;letter-spacing:0"></span></h2>
<div id="tracks"></div>

<h2>My shows <small style="text-transform:none;letter-spacing:0;opacity:.5">— tap to load</small></h2>
<div class="grid" id="shows"></div>
<div class="row" style="margin-top:7px">
  <input type="text" id="name" placeholder="name it…" />
  <button onclick="saveShow()">Save</button>
</div>

<script src="/app.js"></script>
</body>
</html>
