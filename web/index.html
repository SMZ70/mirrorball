<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#07080c">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>mirrorball</title>
<style>
  :root {
    --bg:#07080c; --panel:#12141c; --panel2:#1a1e29; --line:#262c3a;
    --text:#e9ecf5; --muted:#7c8497; --accent:#00e5a0; --hot:#ff3d71; --warn:#ffb020;
    --r:14px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { overscroll-behavior:none; }
  body {
    margin:0; padding:14px 14px 40px; background:var(--bg); color:var(--text);
    font:14px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    max-width:760px; margin-inline:auto;
  }

  /* ── Transport: the one bar that is always visible ─────────────────── */
  .transport {
    position:sticky; top:0; z-index:20; margin:-14px -14px 14px; padding:12px 14px;
    background:rgba(7,8,12,.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  /* Tempo. Typing a number is the fastest way in; the nudges are for when you
     are close and the room is loud. TAP is for when you have no idea. */
  .tempo { display:flex; align-items:center; gap:2px; }
  .tempo input {
    width:62px; padding:4px 0; text-align:center; background:transparent;
    border:none; border-bottom:1px dashed var(--line); color:var(--text);
    font:700 26px/1 ui-sans-serif,system-ui,sans-serif; letter-spacing:-.5px;
    font-variant-numeric:tabular-nums; -moz-appearance:textfield;
  }
  .tempo input:focus { outline:none; border-bottom-color:var(--accent); color:var(--accent); }
  .tempo input::-webkit-outer-spin-button,
  .tempo input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .tempo small { font-size:10px; color:var(--muted); font-weight:600; margin-left:4px; }
  .nudge {
    padding:0; width:28px; height:28px; border-radius:8px; font-size:17px;
    line-height:1; color:var(--muted); background:var(--panel2);
  }
  .beat {
    width:12px; height:12px; border-radius:50%; background:var(--line); flex:none;
    transition:background .05s, box-shadow .05s;
  }
  .beat.on { background:var(--accent); box-shadow:0 0 12px var(--accent); }
  .spacer { flex:1; }

  button {
    font:inherit; font-weight:600; color:var(--text); background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; padding:9px 13px; cursor:pointer;
    transition:transform .05s, background .12s;
  }
  button:active { transform:scale(.95); }
  button.go   { background:var(--accent); color:#00291c; border-color:transparent; }
  button.stop { background:var(--hot);    color:#fff;    border-color:transparent; }
  button.on   { background:var(--warn);   color:#2b1d00; border-color:transparent; }
  button.ghost { background:transparent; color:var(--muted); }

  h2 {
    font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted);
    margin:22px 0 8px; font-weight:600;
  }

  /* On a phone the transport wrapped onto two rows, so BLACK and ▶ -- the two
     buttons you actually reach for in the dark -- ended up on a line of their
     own, below the fold of a sticky bar. Shrink to fit rather than wrap. */
  @media (max-width: 480px) {
    .transport { gap:6px; padding:10px; flex-wrap:nowrap; }
    .transport button { padding:8px 10px; font-size:13px; }
    .tempo input { width:48px; font-size:21px; }
    .tempo small { display:none; }         /* the field is obviously the tempo */
    .nudge { width:26px; height:26px; }
  }

  /* ── Tracks ─────────────────────────────────────────────────────────── */
  .track {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    margin-bottom:9px; overflow:hidden;
  }
  .track.muted { opacity:.42; }
  .thead { display:flex; align-items:center; gap:9px; padding:11px 12px; cursor:pointer; }
  .swatch { width:26px; height:26px; border-radius:8px; flex:none; border:1px solid rgba(255,255,255,.14); }
  .tname { font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tinfo { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .chip {
    font-size:10px; font-weight:700; padding:3px 6px; border-radius:6px;
    background:var(--panel2); color:var(--muted); border:1px solid var(--line);
  }
  .chip.s { background:var(--accent); color:#00291c; border-color:transparent; }
  .chip.m { background:var(--hot); color:#fff; border-color:transparent; }

  .body { padding:0 12px 12px; display:none; }
  .track.open .body { display:block; }

  .row { display:flex; align-items:center; gap:8px; margin:9px 0; }
  .row label { font-size:11px; color:var(--muted); width:58px; flex:none; }
  .row .val { font-size:11px; color:var(--muted); width:44px; text-align:right;
              font-variant-numeric:tabular-nums; flex:none; }

  .segs { display:flex; gap:4px; flex-wrap:wrap; flex:1; }
  .seg {
    flex:1; min-width:44px; padding:7px 4px; font-size:11px; font-weight:600;
    background:var(--panel2); border:1px solid var(--line); border-radius:8px;
    text-align:center; cursor:pointer; user-select:none;
  }
  .seg.sel { background:var(--accent); color:#00291c; border-color:transparent; }

  input[type=range] {
    flex:1; -webkit-appearance:none; height:26px; background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height:5px; border-radius:3px; background:var(--line);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px; margin-top:-8px;
    border-radius:50%; background:var(--text); border:2px solid var(--bg);
  }
  input[type=range].hue::-webkit-slider-runnable-track {
    background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
  }
  input[type=text] {
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:9px; padding:9px 11px; font:inherit; flex:1; min-width:0;
  }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:7px; }
  #err {
    display:none; margin-bottom:10px; padding:9px 12px; border-radius:10px;
    background:#2a1016; border:1px solid var(--hot); color:#ffb3c4; font-size:12px;
  }
  #soloing {
    display:none; margin-bottom:10px; padding:9px 12px; border-radius:10px;
    background:#2b2408; border:1px solid #d9a520; color:#ffdd80;
    font-size:12px; cursor:pointer;
  }
  #soloing.on { display:block; }
  #err.show { display:block; }
  .hint { font-size:12px; color:var(--muted); }

  /* A grouped or linked track says so on its head, so the structure of the show
     is readable without opening anything. */
  .chip.g { background:#123049; color:#7fc7ff; }
  .chip.l { background:#2b1f3d; color:#c9a6ff; }
  .note {
    margin:2px 0 9px; padding:8px 10px; border-radius:9px;
    background:#1a1533; border:1px solid #2f2a4d;
    font-size:11px; line-height:1.45; color:#b9aee6;
  }
  .note b { color:#e2d9ff; }

  /* ── Help ───────────────────────────────────────────────────────────────
     A phone has no hover, so there is nowhere to hide a tooltip. Help is a
     mode instead: press ?, and every control explains itself in place. Off by
     default and remembered, so it teaches once rather than nagging forever. */
  #helpbtn.on { background:var(--accent); color:#00291c; border-color:transparent; }
  .help {
    font-size:11px; line-height:1.45; color:var(--muted);
    margin:-3px 0 9px; padding-left:2px;
  }
  .help b { color:var(--text); font-weight:600; }
  #guide {
    display:none; margin-bottom:12px; padding:11px 13px; border-radius:12px;
    background:var(--panel); border:1px solid var(--line);
    font-size:12px; line-height:1.6; color:var(--muted);
  }
  #guide.show { display:block; }
  #guide b { color:var(--text); }
  #guide .k {
    display:inline-block; min-width:46px; margin-right:6px; color:var(--accent);
    font-weight:700;
  }

  /* Presets. A card has to answer "what is this?" before you tap it: a name,
     the tempo, a word about the feel, and the colours it will put in the room. */
  #presets { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .preset {
    display:flex; flex-direction:column; gap:3px; align-items:stretch;
    padding:0 0 9px; overflow:hidden; text-align:left; text-transform:none;
    letter-spacing:0; background:var(--panel2); border:1px solid var(--line);
    border-radius:12px; cursor:pointer;
  }
  .preset .strip { height:5px; width:100%; }
  .preset .prow {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:7px 10px 0;
  }
  .preset .pname { font-size:14px; font-weight:650; color:var(--text); }
  .preset .pbpm  { font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .preset .pbpm::after { content:" BPM"; }
  .preset .pnote {
    padding:0 10px; font-size:11px; line-height:1.35; color:var(--muted);
  }
  .preset.on { border-color:var(--accent); background:#0d2b23; }
  .preset.on .pname { color:var(--accent); }
  .preset.on .pname::after { content:" ●"; font-size:9px; vertical-align:middle; }
  .preset.edited { border-color:var(--warn); background:#2a2113; }
  .preset.edited .pname { color:var(--warn); }
  .preset.edited .pnote { color:var(--warn); opacity:.8; }
  #shows button.on { border-color:var(--accent); color:var(--accent); }

  /* ── Tracks: building one, and taking it apart ───────────────────────────── */
  .thead .del {
    font-size:13px; color:var(--muted); padding:2px 6px; border-radius:6px;
    cursor:pointer; flex:none;
  }
  .thead .del:hover { color:var(--hot); background:#2a1016; }

  /* The lights IN a track read as chips you can pull out; the ones you can add
     read as an offer. Different jobs, so they must not look the same. */
  .segs.rig .seg.sel b { opacity:.55; margin-left:2px; }
  .segs.free .seg {
    background:transparent; border-style:dashed; color:var(--muted);
  }
  .segs.free .seg:hover { color:var(--accent); border-color:var(--accent); }

  #spare {
    display:none; margin-bottom:10px; padding:9px 11px; border-radius:12px;
    background:var(--panel); border:1px dashed var(--line);
  }
  #spare.show { display:block; }
  #spare .lab { font-size:11px; color:var(--muted); margin-bottom:6px; }
  #spare .segs .seg { flex:0 0 auto; }

  /* Nine preset cards pushed the tracks off the screen. A section you are not
     using should not cost you the whole viewport, so they fold -- and it is
     remembered, because a preference re-asked every visit is not a preference. */
  h2.fold { cursor:pointer; user-select:none; }
  h2.fold::before {
    content:"▾"; display:inline-block; margin-right:6px; font-size:9px;
    transition:transform .12s; transform:rotate(0deg);
  }
  h2.fold.shut::before { transform:rotate(-90deg); }
  h2.fold.shut + .grid,
  h2.fold.shut + .grid + .row { display:none; }

  /* The editor was one long scroll with everything at equal weight. The things
     you reach for first stay up top; the fine tuning waits until you ask. */
  .more {
    display:flex; align-items:center; gap:8px; margin:12px 0 4px; padding:8px 10px;
    border:1px dashed var(--line); border-radius:9px;
    font-size:11px; font-weight:600; color:var(--muted); cursor:pointer;
  }
  .more:hover { color:var(--text); }
  .more.on { color:var(--accent); border-color:var(--accent); }
  .more small { font-weight:400; opacity:.6; }

  .addrow { display:flex; gap:7px; margin-top:9px; }
  #picker {
    display:none; margin-top:8px; padding:10px 11px; border-radius:12px;
    background:var(--panel); border:1px solid var(--accent);
  }
  #picker.show { display:block; }
  #picker .lab { font-size:11px; color:var(--accent); margin-bottom:7px; }
  #picker .segs .seg { flex:0 0 auto; }
  #addtrack { flex:1; border-style:dashed; color:var(--accent); background:transparent; }
  #addtrack:disabled { color:var(--muted); border-color:var(--line); cursor:default; }

  /* ── Playground ──────────────────────────────────────────────────────────
     Everything here is additive and hidden unless the playground is open, so
     the live panel looks and behaves exactly as it did. */
  .modes { display:flex; gap:6px; margin-bottom:10px; }
  .modes button {
    flex:1; padding:8px; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  }
  .modes button.on { border-color:var(--accent); color:var(--accent); background:#0d2b23; }
  #pg.on { border-color:#c07ae8; color:#c07ae8; background:#1e1130; }

  /* An unmissable reminder that nothing here reaches the room. */
  body.pg .transport { border-color:#4a2d63; }
  #pgnote { display:none; font-size:11px; color:#c9a6e6; margin-bottom:10px; }
  body.pg #pgnote { display:block; }

  #stage, #rig { display:none; }
  #stage.show, #rig.show { display:flex; }

  #stage {
    flex-wrap:wrap; gap:10px; justify-content:center;
    padding:16px 10px; margin-bottom:10px;
    background:#07080b; border:1px solid var(--line); border-radius:14px;
  }
  .bulb { width:64px; text-align:center; }
  .bulb .glow {
    width:44px; height:44px; margin:0 auto 5px; border-radius:50%;
    background:#14161c; transition:background 40ms linear;
  }
  .bulb span {
    display:block; font-size:9px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  #rig { align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  #rig label { font-size:11px; color:var(--muted); }
  #rig-count { display:flex; align-items:center; gap:8px; flex:1; min-width:160px; }
  #rig-n { flex:1; }
</style>
</head>
<body>

<div class="modes">
  <button id="live" class="on" onclick="setMode('live')">Live · your room</button>
  <button id="pg" onclick="setMode('pg')">Playground</button>
</div>

<div id="pgnote">
  Sandbox. The server renders this show with the same engine that drives the
  lights, but sends the frames here instead of to the bridge — <b>nothing in the
  playground can touch your room</b>. Your live show is kept exactly as you left it.
</div>

<div id="rig">
  <label>rig</label>
  <button id="rig-real" onclick="setRig('real')">my lights</button>
  <button id="rig-virtual" onclick="setRig('virtual')">virtual</button>
  <span id="rig-count">
    <input id="rig-n" type="range" min="1" max="24" step="1"
           oninput="setRig('virtual', +this.value)">
    <span id="rig-nval" class="val"></span>
  </span>
</div>

<div id="stage"></div>

<div class="transport">
  <span class="beat" id="beat"></span>

  <span class="tempo">
    <button class="nudge" onclick="nudgeBpm(-1)" aria-label="slower">−</button>
    <input id="bpm" type="number" min="40" max="220" step="1"
           inputmode="numeric" enterkeyhint="done"
           onchange="setBpm(+this.value)" onfocus="this.select()">
    <button class="nudge" onclick="nudgeBpm(1)" aria-label="faster">+</button>
    <small>BPM</small>
  </span>

  <button onclick="tap()">TAP</button>
  <button class="ghost" onclick="sendW({type:'resync'})" title="resync">↻</button>
  <span class="spacer"></span>
  <button id="helpbtn" class="ghost" onclick="toggleHelp()">?</button>
  <button id="blackout" onclick="toggleBlackout()">BLACK</button>
  <button id="play" class="go" onclick="togglePlay()">▶</button>
</div>

<!-- A solo silences every other track. That must never be invisible: a latched
     solo you cannot see just looks like the rest of your show has died. -->
<div id="soloing" onclick="clearSolo()"></div>

<div id="err"></div>
<div id="guide"></div>

<h2 class="fold" id="h-presets" onclick="fold('presets')">Presets</h2>
<div class="grid" id="presets"></div>

<h2>Tracks <span id="area" style="text-transform:none;letter-spacing:0"></span></h2>

<!-- Lights in no track. They used to be invisible -- buried as unselected chips
     inside the editor of a track they had nothing to do with. -->
<div id="spare"></div>

<div id="tracks"></div>
<div class="addrow">
  <button id="addtrack" onclick="togglePicker()">＋ Track</button>
  <button class="ghost" onclick="newShow()">New show</button>
</div>
<!-- Which light the new track is for is YOUR call, not the panel's. -->
<div id="picker"></div>

<h2 class="fold" id="h-shows" onclick="fold('shows')">My shows
  <small style="text-transform:none;letter-spacing:0;opacity:.5">— tap to load</small></h2>
<div class="grid" id="shows"></div>
<div class="row" style="margin-top:7px">
  <input type="text" id="name" placeholder="name it…" />
  <button onclick="saveShow()">Save</button>
</div>

<!-- ?v is a cache buster, and it is not decoration. A browser holding a stale
     app.js will happily serve it to a brand-new index.html without ever asking
     the server -- which is how the Playground button came to render and then do
     nothing when tapped. Bump this whenever app.js changes shape enough that an
     old copy would break the new page. The server also sends no-store now, so
     this should be the last time it is needed. -->
<script src="/app.js?v=2"></script>
</body>
</html>
